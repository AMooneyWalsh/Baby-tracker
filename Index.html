<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Baby Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0f11;--surface:#17191d;--surface2:#1f2127;
  --border:#2a2d35;--border2:#363a45;
  --text:#e8e6e1;--muted:#6b6f7a;--muted2:#4a4e5a;
  --accent:#c8a96e;--accent2:#e8c98e;
  --sleep:#5b8db8;--breast:#d4845a;--bottle:#9b84c4;--diaper:#5baa82;
  --awake:#2a2d35;
  --r:8px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html{font-size:15px}
body{
  background:var(--bg);color:var(--text);
  font-family:'Geist Mono',monospace;
  min-height:100vh;line-height:1.5;
  -webkit-tap-highlight-color:transparent;
}

/* ── Upload ──────────────────────────────────────────────────── */
#upload-screen{
display:flex;flex-direction:column;align-items:center;
justify-content:center;min-height:100vh;
padding:32px 20px;text-align:center;
}
.app-wordmark{
font-family:‘Instrument Serif’,serif;font-size:13px;
letter-spacing:.25em;text-transform:uppercase;
color:var(–muted);margin-bottom:48px;
}
.upload-hero{
font-family:‘Instrument Serif’,serif;
font-size:clamp(32px,6vw,52px);font-style:italic;
color:var(–text);line-height:1.1;margin-bottom:12px;
}
.upload-sub{font-size:12px;color:var(–muted);letter-spacing:.06em;margin-bottom:48px}
.drop-zone{
width:100%;max-width:420px;
border:1.5px dashed var(–border2);
border-radius:12px;padding:48px 32px;
cursor:pointer;transition:border-color .2s,background .2s;
position:relative;
}
.drop-zone:hover,.drop-zone.drag-over{
border-color:var(–accent);background:rgba(200,169,110,.05);
}
.drop-icon{font-size:32px;margin-bottom:14px;opacity:.7}
.drop-label{font-size:13px;color:var(–muted);letter-spacing:.05em}
.drop-label strong{color:var(–accent);font-weight:500}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
.supported{font-size:10px;color:var(–muted2);margin-top:8px}

/* ── Error banner ────────────────────────────────────────────── */
.error-banner{
display:none;margin-top:16px;padding:10px 16px;
background:rgba(180,60,60,.12);border:1px solid rgba(180,60,60,.3);
border-radius:6px;font-size:11px;color:#e08080;letter-spacing:.04em;
max-width:420px;width:100%;
}
.error-banner.visible{display:block}

/* ── Dashboard ───────────────────────────────────────────────── */
#dashboard-screen{display:none;min-height:100vh}

/* Config bar */
.config-bar{
background:var(–surface);border-bottom:1px solid var(–border);
padding:12px 14px 10px;position:sticky;top:0;z-index:100;
}
.picker-row{
display:grid;grid-template-columns:40px 1fr 1fr;
align-items:center;gap:6px;margin-bottom:6px;
}
.picker-row-label{
font-size:9px;letter-spacing:.12em;text-transform:uppercase;
color:var(–muted2);text-align:right;padding-right:2px;
}
.sel-wrap{
position:relative;background:var(–surface2);
border:1px solid var(–border);border-radius:6px;
height:38px;overflow:hidden;
}
.sel-wrap::after{
content:‘▾’;position:absolute;right:8px;top:50%;
transform:translateY(-50%);font-size:10px;color:var(–muted);
pointer-events:none;line-height:1;
}
.sel-wrap select{
width:100%;height:100%;background:transparent;border:none;outline:none;
color:var(–text);font-family:‘Geist Mono’,monospace;
font-size:13px;font-weight:500;padding:0 28px 0 10px;
appearance:none;-webkit-appearance:none;cursor:pointer;
}
.action-row{display:flex;align-items:center;gap:6px;margin-top:8px;}
.btn-update{
background:var(–accent);color:#0e0f11;border:none;border-radius:6px;
height:38px;flex:1;
font-family:‘Geist Mono’,monospace;font-size:11px;font-weight:500;
letter-spacing:.08em;text-transform:uppercase;cursor:pointer;
transition:background .15s,opacity .15s;
}
.btn-update:hover{background:var(–accent2)}
.btn-update:active{opacity:.8}
.btn-share{
background:transparent;color:var(–muted);
border:1px solid var(–border);border-radius:6px;
height:38px;padding:0 14px;
font-family:‘Geist Mono’,monospace;font-size:11px;letter-spacing:.06em;
cursor:pointer;white-space:nowrap;
transition:color .15s,border-color .15s,background .15s;
flex-shrink:0;display:flex;align-items:center;gap:6px;
}
.btn-share:hover{color:var(–text);border-color:var(–border2)}
.btn-share:disabled{opacity:.4;cursor:default}
.btn-share-spinner{
width:10px;height:10px;border:1.5px solid currentColor;
border-top-color:transparent;border-radius:50%;
animation:spin .6s linear infinite;display:none;
}
.btn-share.loading .btn-share-spinner{display:block}
.btn-share.loading .btn-share-label{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

.config-footer{
display:flex;align-items:center;justify-content:space-between;margin-top:8px;
}
.btn-new{
background:transparent;color:var(–muted2);border:none;
font-family:‘Geist Mono’,monospace;font-size:10px;cursor:pointer;
letter-spacing:.04em;padding:0;transition:color .15s;
}
.btn-new:hover{color:var(–muted)}
.data-hint{font-size:9px;color:var(–muted2);letter-spacing:.03em}

/* ── Dashboard body ──────────────────────────────────────────── */
.dashboard{max-width:760px;margin:0 auto;padding:28px 14px 80px}
.dash-header{margin-bottom:28px}
.dash-eyebrow{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(–muted);margin-bottom:6px}
.dash-title{
font-family:‘Instrument Serif’,serif;
font-size:clamp(26px,5vw,46px);font-style:italic;
line-height:1.1;color:var(–text);
}
.dash-title em{font-style:normal;color:var(–accent)}
.dash-range{font-size:11px;color:var(–muted);margin-top:7px;letter-spacing:.04em}

.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:24px}
@media(min-width:480px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
.stat-card{
background:var(–surface);border:1px solid var(–border);
border-radius:var(–r);padding:14px;
transition:border-color .2s;
}
.stat-card:hover{border-color:var(–border2)}
.stat-card-icon{font-size:15px;margin-bottom:6px;opacity:.8}
.stat-card-value{
font-family:‘Instrument Serif’,serif;font-size:28px;
line-height:1;color:var(–text);
}
.stat-card-unit{font-size:10px;color:var(–muted);margin-left:2px;font-family:‘Geist Mono’,monospace}
.stat-card-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(–muted);margin-top:4px}

.section-label{
font-size:9px;letter-spacing:.16em;text-transform:uppercase;
color:var(–muted2);margin-bottom:10px;padding-bottom:7px;
border-bottom:1px solid var(–border);
}
.timeline-section{margin-bottom:24px}
.tl-axis{
display:flex;justify-content:space-between;
font-size:9px;color:var(–muted2);letter-spacing:.04em;margin-bottom:4px;
}
.tl-bar-wrap{
position:relative;height:52px;background:var(–awake);
border-radius:6px;overflow:hidden;border:1px solid var(–border);
cursor:default;
}
.tl-segment{position:absolute;top:0;bottom:0;transition:opacity .15s}
.tl-segment:hover{opacity:1!important;filter:brightness(1.15)}
.tl-marker{position:absolute;top:0;bottom:0;width:4px;border-radius:2px}
.tl-sleep-label{
position:absolute;top:0;bottom:0;
display:flex;align-items:center;justify-content:center;
font-size:8px;letter-spacing:.08em;text-transform:uppercase;
color:rgba(255,255,255,.5);pointer-events:none;overflow:hidden;white-space:nowrap;
}
.tl-hour-ticks{position:relative;height:18px;margin-top:2px}
.tl-tick{
position:absolute;transform:translateX(-50%);
font-size:9px;color:var(–muted2);white-space:nowrap;
}

.legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:24px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:10px;color:var(–muted);letter-spacing:.05em}
.legend-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0}

.event-list{display:flex;flex-direction:column;gap:4px}
.ev{
display:grid;grid-template-columns:42px 10px 1fr auto;
align-items:center;gap:8px;padding:9px 12px;
background:var(–surface);border:1px solid var(–border);
border-radius:6px;animation:slideIn .2s ease both;
}
@keyframes slideIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.ev-time{font-size:10px;color:var(–muted);font-weight:500}
.ev-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ev-label{font-size:11px;color:var(–text)}
.ev-detail{font-size:10px;color:var(–muted);text-align:right;white-space:nowrap}
.empty{
text-align:center;padding:48px 16px;
color:var(–muted);font-size:12px;letter-spacing:.05em;
}

/* ── Share overlay ───────────────────────────────────────────── */
#share-overlay{
position:fixed;inset:0;z-index:9999;
background:rgba(14,15,17,.96);
backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
overflow-y:auto;-webkit-overflow-scrolling:touch;
padding:20px 16px calc(20px + var(–safe-bottom));
display:flex;flex-direction:column;align-items:center;
opacity:0;animation:fadeUp .25s ease forwards;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.share-inner{width:100%;max-width:680px}
.share-topbar{
display:flex;align-items:center;justify-content:space-between;
margin-bottom:16px;
}
.share-eyebrow{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(–muted)}
.share-close{
background:var(–surface2);color:var(–text);
border:1px solid var(–border);border-radius:6px;
padding:6px 14px;font-family:‘Geist Mono’,monospace;font-size:11px;
cursor:pointer;transition:background .15s;
}
.share-close:hover{background:var(–border)}

.share-actions{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.share-btn{
display:inline-flex;align-items:center;gap:7px;
background:var(–accent);color:#0e0f11;
border:none;border-radius:6px;padding:10px 18px;
font-family:‘Geist Mono’,monospace;font-size:11px;
font-weight:500;letter-spacing:.06em;cursor:pointer;
text-decoration:none;transition:background .15s;
}
.share-btn:hover{background:var(–accent2)}
.share-btn.secondary{
background:var(–surface2);color:var(–text);
border:1px solid var(–border);
}
.share-btn.secondary:hover{border-color:var(–border2)}

.share-hint{
background:var(–surface);border:1px solid var(–border);
border-radius:8px;padding:12px 14px;
margin-bottom:14px;font-size:11px;color:var(–muted);line-height:1.9;
}
.share-hint strong{color:var(–accent)}
.share-hint span{color:var(–text)}
.share-img-wrap{
background:var(–surface);border:1px solid var(–border);
border-radius:8px;padding:10px;overflow:hidden;
}
.share-img-wrap img{
width:100%;border-radius:5px;display:block;
-webkit-touch-callout:default;
}

/* ── Print ───────────────────────────────────────────────────── */
@media print{
body{background:#fff;color:#1a1a1a}
.config-bar,.error-banner,#upload-screen,#share-overlay{display:none!important}
#dashboard-screen{display:block!important}
:root{
–bg:#fff;–surface:#f5f5f0;–border:#ddd;–text:#1a1a1a;
–muted:#666;–muted2:#999;–accent:#8a6020;
–sleep:#4a7ca8;–breast:#b8704a;–bottle:#7a64a8;
–diaper:#4a9a6a;–awake:#e8e4dc;
}
.stats-grid{grid-template-columns:repeat(4,1fr)!important}
.ev{break-inside:avoid}
}
</style>

<script>
// ─────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────
let parsedRows = [];
let availableDates = [];
let lastCanvasDataUrl = null; // cache so share overlay doesn't re-render

// ─────────────────────────────────────────────────────────────
// URL encode / decode  (stores data in the hash so nothing hits a server)
// Format: #d=<base64url(deflate-like packed JSON))>
// We use a simple approach: JSON → UTF-8 bytes → base64url
// For typical overnight exports (~200-400 rows) this stays under ~60KB,
// well within browser URL limits for hash-only URLs.
// ─────────────────────────────────────────────────────────────
function buildShareUrl() {
  if (!parsedRows.length) return null;
  const payload = {
    rows: parsedRows,
    ws: {
      date: document.getElementById('sel-start-date').value,
      hour: document.getElementById('sel-start-hour').value,
    },
    we: {
      date: document.getElementById('sel-end-date').value,
      hour: document.getElementById('sel-end-hour').value,
    },
  };
  try {
    const json    = JSON.stringify(payload);
    const b64     = btoa(unescape(encodeURIComponent(json)));
    const b64url  = b64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    const url     = window.location.href.split('#')[0] + '#d=' + b64url;
    return url;
  } catch (e) {
    return null;
  }
}

function loadFromHash() {
  const hash = window.location.hash;
  if (!hash.startsWith('#d=')) return false;
  try {
    const b64url = hash.slice(3);
    const b64    = b64url.replace(/-/g, '+').replace(/_/g, '/');
    const json   = decodeURIComponent(escape(atob(b64)));
    const payload = JSON.parse(json);
    if (!payload.rows || !payload.rows.length) return false;
    parsedRows = payload.rows;
    lastCanvasDataUrl = null;
    buildPickers();
    // Restore the saved window selection after pickers are built
    if (payload.ws) {
      setSelVal('sel-start-date', payload.ws.date);
      document.getElementById('sel-start-hour').value = payload.ws.hour;
    }
    if (payload.we) {
      setSelVal('sel-end-date', payload.we.date);
      document.getElementById('sel-end-hour').value = payload.we.hour;
    }
    renderDashboard();
    return true;
  } catch (e) {
    return false;
  }
}

// ─────────────────────────────────────────────────────────────
// Auto-load from URL hash on startup
// ─────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => { loadFromHash(); });

// ─────────────────────────────────────────────────────────────
// CSV parsing
// ─────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = splitLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = splitLine(line);
    const obj = {};
    headers.forEach((h, i) => {
      obj[h.trim()] = (vals[i] || '').trim().replace(/^"|"$/g, '');
    });
    return obj;
  }).filter(r => r['Type'] && r['Type'].length);
}

function splitLine(line) {
  const out = []; let cur = ''; let q = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { q = !q; }
    else if (c === ',' && !q) { out.push(cur); cur = ''; }
    else { cur += c; }
  }
  out.push(cur);
  return out;
}

// ─────────────────────────────────────────────────────────────
// File loading
// ─────────────────────────────────────────────────────────────
const dropZone  = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});
// Keyboard accessibility on drop zone
dropZone.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); }
});

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.classList.add('visible');
}
function clearError() {
  document.getElementById('error-banner').classList.remove('visible');
}

function loadFile(file) {
  clearError();
  if (!file.name.toLowerCase().endsWith('.csv')) {
    showError('Please select a .csv file — Nara Baby exports use CSV format.');
    return;
  }
  const reader = new FileReader();
  reader.onload = ev => {
    const rows = parseCSV(ev.target.result);
    if (!rows.length) {
      showError('Could not parse this file. Is it a Nara Baby CSV export?');
      return;
    }
    parsedRows = rows;
    lastCanvasDataUrl = null;
    buildPickers();
  };
  reader.onerror = () => showError('Failed to read file. Please try again.');
  reader.readAsText(file);
}

// ─────────────────────────────────────────────────────────────
// Pickers
// ─────────────────────────────────────────────────────────────
function buildPickers() {
  const dateSet = new Set();
  parsedRows.forEach(row => {
    const ms    = parseInt(row['Start Date/time (Epoch)']);
    const endMs = parseInt(row['[Sleep] End Date/time (Epoch)']);
    if (!isNaN(ms)    && ms > 0)    dateSet.add(localDateStr(new Date(ms)));
    if (!isNaN(endMs) && endMs > 0) dateSet.add(localDateStr(new Date(endMs)));
  });
  availableDates = [...dateSet].sort();

  ['sel-start-date', 'sel-end-date'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = '';
    availableDates.forEach(ds => {
      const opt = document.createElement('option');
      opt.value = ds;
      opt.textContent = fmtDateOpt(ds);
      sel.appendChild(opt);
    });
  });

  setSmartDefault();
  populateStartHours();
  populateEndHours();

  const first = availableDates[0], last = availableDates[availableDates.length - 1];
  document.getElementById('data-hint').textContent =
    first === last ? fmtDateOpt(first) : fmtDateOpt(first) + ' → ' + fmtDateOpt(last);

  document.getElementById('upload-screen').style.display  = 'none';
  document.getElementById('dashboard-screen').style.display = 'block';
  renderDashboard();
}

function setSmartDefault() {
  const epochs = parsedRows
    .map(r => parseInt(r['Start Date/time (Epoch)']))
    .filter(n => !isNaN(n) && n > 0).sort((a, b) => a - b);
  if (!epochs.length) return;

  const latest = new Date(epochs[epochs.length - 1]);
  const h = latest.getHours();
  let wsDate, wsHour, weDate, weHour;

  if (h >= 20) {
    wsDate = localDateStr(latest); wsHour = 20;
    const we = new Date(latest); we.setDate(we.getDate() + 1);
    weDate = localDateStr(we); weHour = 8;
  } else {
    const ws = new Date(latest); ws.setDate(ws.getDate() - 1);
    wsDate = localDateStr(ws); wsHour = 20;
    const endD = new Date(latest); endD.setHours(8, 0, 0, 0);
    weDate = localDateStr(endD); weHour = 8;
  }

  const first = availableDates[0], last = availableDates[availableDates.length - 1];
  if (wsDate < first) wsDate = first;
  if (weDate > last)  weDate = last;

  setSelVal('sel-start-date', wsDate);
  setSelVal('sel-end-date',   weDate);
  document._defWsH = wsHour;
  document._defWeH = weHour;
}

function populateStartHours() { fillHours('sel-start-hour', document._defWsH ?? 20); }
function populateEndHours()   { fillHours('sel-end-hour',   document._defWeH ?? 8); }

function fillHours(id, prefer) {
  const sel = document.getElementById(id);
  const prev = parseInt(sel.value);
  const target = !isNaN(prev) && sel.options.length ? prev : prefer;
  sel.innerHTML = '';
  for (let h = 0; h < 24; h++) {
    const opt = document.createElement('option');
    opt.value = h;
    opt.textContent = pad(h) + ':00';
    sel.appendChild(opt);
  }
  sel.value = target;
}

function setSelVal(id, val) {
  const sel = document.getElementById(id);
  const opt = [...sel.options].find(o => o.value === val);
  if (opt) sel.value = val;
}

// ─────────────────────────────────────────────────────────────
// Window
// ─────────────────────────────────────────────────────────────
function getWindow() {
  const sd = document.getElementById('sel-start-date').value;
  const sh = parseInt(document.getElementById('sel-start-hour').value) || 0;
  const ed = document.getElementById('sel-end-date').value;
  const eh = parseInt(document.getElementById('sel-end-hour').value) || 0;
  return {
    ws: new Date(sd + 'T' + pad(sh) + ':00:00').getTime(),
    we: new Date(ed + 'T' + pad(eh) + ':00:00').getTime(),
  };
}

// ─────────────────────────────────────────────────────────────
// Render dashboard
// ─────────────────────────────────────────────────────────────
function renderDashboard() {
  lastCanvasDataUrl = null; // invalidate cached image on re-render
  const { ws, we } = getWindow();
  if (!ws || !we || we <= ws) return;
  const dur = we - ws;

  const events = [];
  parsedRows.forEach(row => {
    const type = row['Type'];
    const ms   = parseInt(row['Start Date/time (Epoch)']);
    if (isNaN(ms)) return;

    if (type === 'Sleep') {
      const endMs = parseInt(row['[Sleep] End Date/time (Epoch)']);
      if (isNaN(endMs) || endMs < ws || ms > we) return;
      events.push({ type: 'sleep', ms, endMs, label: 'Sleep',
        detail: fmtDur(Math.min(endMs, we) - Math.max(ms, ws)) });

    } else if (type === 'Breastfeed') {
      if (ms < ws || ms > we) return;
      const l = parseInt(row['[Breastfeed] Left Duration (Seconds)']) || 0;
      const r = parseInt(row['[Breastfeed] Right Duration (Seconds)']) || 0;
      const sides = [l > 0 ? 'L' : '', r > 0 ? 'R' : ''].filter(Boolean).join('+');
      events.push({ type: 'breast', ms, label: 'Breastfeed',
        detail: Math.round((l + r) / 60) + ' min' + (sides ? ' · ' + sides : ''),
        durationSec: l + r });

    } else if (type === 'Bottle Feed') {
      if (ms < ws || ms > we) return;
      const bmv = row['[Bottle Feed] Breast Milk Volume'];
      const fmv = row['[Bottle Feed] Formula Volume'];
      const fmn = row['[Bottle Feed] Formula Name'];
      let detail = 'Bottle';
      if (bmv && bmv !== '0' && bmv !== '') detail = 'Breast milk · ' + bmv + ' ml';
      else if (fmv && fmv !== '0' && fmv !== '') detail = (fmn || 'Formula') + ' · ' + fmv + ' ml';
      events.push({ type: 'bottle', ms, label: 'Bottle feed', detail });

    } else if (type === 'Diaper') {
      if (ms < ws || ms > we) return;
      events.push({ type: 'diaper', ms, label: 'Nappy change', detail: row['[Diaper] Type'] || '' });
    }
  });
  events.sort((a, b) => a.ms - b.ms);

  // Stats
  const sleepMs = events.filter(e => e.type === 'sleep')
    .reduce((a, e) => a + (Math.min(e.endMs, we) - Math.max(e.ms, ws)), 0);
  const bfSec   = events.filter(e => e.type === 'breast')
    .reduce((a, e) => a + (e.durationSec || 0), 0);
  const feeds   = events.filter(e => e.type === 'breast' || e.type === 'bottle').length;
  const nappies = events.filter(e => e.type === 'diaper').length;

  document.getElementById('stat-sleep').textContent   = (sleepMs / 3600000).toFixed(1);
  document.getElementById('stat-bf').textContent      = Math.round(bfSec / 60);
  document.getElementById('stat-feeds').textContent   = feeds;
  document.getElementById('stat-nappies').textContent = nappies;

  // Title / eyebrow
  const start = new Date(ws), end = new Date(we);
  const spanH = dur / 3600000;
  const xMid  = start.getDate() !== end.getDate();
  const startH = start.getHours();
  const name = getBabyName();
  const pfx = name ? name + "'s " : '';
  const M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let word, eyebrow;
  if (xMid || spanH >= 9) { word = 'night'; eyebrow = 'Night summary'; }
  else if (startH >= 5  && startH < 12) { word = 'morning';   eyebrow = 'Morning summary'; }
  else if (startH >= 12 && startH < 17) { word = 'afternoon'; eyebrow = 'Afternoon summary'; }
  else if (startH >= 17)                { word = 'evening';   eyebrow = 'Evening summary'; }
  else                                  { word = 'day';       eyebrow = 'Summary'; }

  const cap = (pfx + word).charAt(0).toUpperCase() + (pfx + word).slice(1);
  const dStr = xMid
    ? `${start.getDate()} ${M[start.getMonth()]} → ${end.getDate()} ${M[end.getMonth()]}`
    : `${start.getDate()} ${M[start.getMonth()]}`;

  document.getElementById('dash-eyebrow').textContent = eyebrow;
  document.getElementById('dash-title').innerHTML = `${cap} <em>${dStr}</em>`;
  document.getElementById('dash-range').textContent = fmtDT(start) + ' → ' + fmtDT(end);

  // Timeline
  const bar = document.getElementById('tl-bar');
  bar.innerHTML = '';

  events.filter(e => e.type === 'sleep').forEach(e => {
    const l = Math.max(e.ms, ws), r = Math.min(e.endMs, we);
    if (r <= l) return;
    const widthPct = (r - l) / dur * 100;
    const seg = document.createElement('div');
    seg.className = 'tl-segment';
    seg.style.cssText = `left:${pct(l-ws,dur)};width:${pct(r-l,dur)};background:var(--sleep);`;
    seg.title = 'Sleep · ' + fmtDur(r - l);
    bar.appendChild(seg);
    if (widthPct > 8) {
      const lbl = document.createElement('div');
      lbl.className = 'tl-sleep-label';
      lbl.style.cssText = `left:${pct(l-ws,dur)};width:${pct(r-l,dur)};`;
      lbl.textContent = fmtDur(r - l);
      bar.appendChild(lbl);
    }
  });

  events.filter(e => e.type === 'breast').forEach(e => {
    const feedDurMs = (e.durationSec || 0) * 1000;
    const l = Math.max(e.ms, ws), r = Math.min(e.ms + feedDurMs, we);
    if (r <= l) return;
    const widthPct = (r - l) / dur * 100;
    const seg = document.createElement('div');
    seg.className = 'tl-segment';
    seg.style.cssText = `left:${pct(l-ws,dur)};width:${pct(r-l,dur)};background:var(--breast);opacity:.9;`;
    seg.title = 'Breastfeed · ' + fmtDur(feedDurMs);
    bar.appendChild(seg);
    if (widthPct > 5) {
      const lbl = document.createElement('div');
      lbl.className = 'tl-sleep-label';
      lbl.style.cssText = `left:${pct(l-ws,dur)};width:${pct(r-l,dur)};`;
      lbl.textContent = fmtDur(feedDurMs);
      bar.appendChild(lbl);
    }
  });

  const markerColors = { bottle: 'var(--bottle)', diaper: 'var(--diaper)' };
  events.filter(e => e.type === 'bottle' || e.type === 'diaper').forEach(e => {
    const m = document.createElement('div');
    m.className = 'tl-marker';
    m.style.cssText = `left:${pct(e.ms-ws,dur)};background:${markerColors[e.type]};opacity:.95;`;
    m.title = e.label + ': ' + e.detail;
    bar.appendChild(m);
  });

  // Hour ticks
  document.getElementById('tl-axis').innerHTML =
    `<span>${hh(start)}</span><span>${hh(end)}</span>`;
  const ticksEl  = document.getElementById('tl-ticks');
  ticksEl.innerHTML = '';
  const totalH = Math.ceil(spanH);
  const intv   = totalH <= 12 ? 1 : totalH <= 24 ? 2 : 4;
  let t = new Date(ws); t.setMinutes(0, 0, 0); t.setHours(t.getHours() + 1);
  while (t.getTime() < we) {
    if (t.getHours() % intv === 0) {
      const pos = (t.getTime() - ws) / dur * 100;
      if (pos > 1.5 && pos < 98.5) {
        const tick = document.createElement('div');
        tick.className = 'tl-tick';
        tick.style.left = pos + '%';
        tick.textContent = hh(t);
        ticksEl.appendChild(tick);
      }
    }
    t = new Date(t.getTime() + 3600000);
  }

  // Event list
  const list = document.getElementById('event-list');
  list.innerHTML = '';
  if (!events.length) {
    list.innerHTML = '<div class="empty">No events in this time range.</div>';
    return;
  }
  const dc = {
    sleep: 'var(--sleep)', breast: 'var(--breast)',
    bottle: 'var(--bottle)', diaper: 'var(--diaper)',
  };
  events.forEach((e, i) => {
    const row = document.createElement('div');
    row.className = 'ev';
    row.style.animationDelay = (i * .025) + 's';
    row.innerHTML = `
      <div class="ev-time">${hh(new Date(e.ms))}</div>
      <div class="ev-dot" style="background:${dc[e.type]}"></div>
      <div class="ev-label">${e.label}</div>
      <div class="ev-detail">${e.detail}</div>`;
    list.appendChild(row);
  });
}

// ─────────────────────────────────────────────────────────────
// Share — native Web Share API with canvas image fallback
// ─────────────────────────────────────────────────────────────
async function handleShare() {
  const btn = document.getElementById('btn-share');
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    if (!lastCanvasDataUrl) {
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
      const canvas = buildCanvas();
      lastCanvasDataUrl = canvas.toDataURL('image/jpeg', 0.93);
    }

    const shareUrl = buildShareUrl();

    // Try native Web Share (mobile-first)
    if (navigator.share && navigator.canShare) {
      try {
        const blob = dataURItoBlob(lastCanvasDataUrl);
        const file = new File([blob], 'baby-summary.jpg', { type: 'image/jpeg' });
        const shareData = {
          title: document.getElementById('dash-title').textContent + ' – Baby Tracker',
          ...(shareUrl ? { url: shareUrl } : {}),
          ...(navigator.canShare({ files: [file] }) ? { files: [file] } : {}),
        };
        if (navigator.canShare(shareData)) {
          await navigator.share(shareData);
          return;
        }
      } catch (shareErr) {
        if (shareErr.name === 'AbortError') return;
        // fall through to overlay
      }
    }

    showShareOverlay(lastCanvasDataUrl, shareUrl);
  } catch (err) {
    showError('Could not generate share content: ' + err.message);
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function showShareOverlay(dataUrl, shareUrl) {
  document.getElementById('share-overlay')?.remove();

  const ov = document.createElement('div');
  ov.id = 'share-overlay';
  ov.setAttribute('role', 'dialog');
  ov.setAttribute('aria-modal', 'true');
  ov.setAttribute('aria-label', 'Share your summary');

  // Download button
  let downloadBtn = '';
  try {
    const blob    = dataURItoBlob(dataUrl);
    const blobUrl = URL.createObjectURL(blob);
    downloadBtn = `<a href="${blobUrl}" download="baby-summary.jpg" class="share-btn">↓ Download image</a>`;
    setTimeout(() => URL.revokeObjectURL(blobUrl), 60000);
  } catch (_) {}

  // Copy image to clipboard
  const copyImgBtn = `<button class="share-btn secondary" onclick="copyImageToClipboard()" id="copy-img-btn">⎘ Copy image</button>`;

  // Copy link button — only shown if we have a URL
  const copyLinkBtn = shareUrl
    ? `<button class="share-btn secondary" onclick="copyShareLink()" id="copy-link-btn" data-url="${encodeURIComponent(shareUrl)}">🔗 Copy link</button>`
    : '';

  // Link display box
  const linkBox = shareUrl ? `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:14px;display:flex;align-items:center;gap:8px;overflow:hidden;">
      <span style="font-size:10px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'Geist Mono',monospace;" id="share-url-display">${shareUrl}</span>
      <button onclick="copyShareLink()" id="copy-link-btn2" data-url="${encodeURIComponent(shareUrl)}"
        style="background:var(--accent);color:#0e0f11;border:none;border-radius:4px;padding:4px 10px;font-family:'Geist Mono',monospace;font-size:10px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;">
        Copy
      </button>
    </div>` : '';

  ov.innerHTML = `
    <div class="share-inner">
      <div class="share-topbar">
        <span class="share-eyebrow">Share summary</span>
        <button class="share-close" onclick="closeShareOverlay()">← Back</button>
      </div>
      ${shareUrl ? `<div style="font-size:10px;color:var(--muted);letter-spacing:.04em;margin-bottom:8px;">Anyone with this link sees the full interactive dashboard — no upload needed.</div>` : ''}
      ${linkBox}
      <div class="share-actions">
        ${downloadBtn}
        ${copyImgBtn}
      </div>
      <div class="share-hint">
        📱 <strong>iPhone / Android:</strong> Long-press image → <span>Save to Photos</span> or <span>Share…</span><br>
        💻 <strong>Desktop:</strong> Right-click image → <span>Save image as…</span>
      </div>
      <div class="share-img-wrap">
        <img src="${dataUrl}" alt="Baby tracker summary" id="share-img">
      </div>
    </div>`;

  document.body.appendChild(ov);
  ov.querySelector('.share-close').focus();
  ov.addEventListener('keydown', e => { if (e.key === 'Escape') closeShareOverlay(); });
}

function closeShareOverlay() {
  const ov = document.getElementById('share-overlay');
  if (!ov) return;
  ov.style.animation = 'none';
  ov.style.opacity   = '0';
  ov.style.transform = 'translateY(8px)';
  ov.style.transition = 'opacity .2s,transform .2s';
  setTimeout(() => ov.remove(), 200);
  document.getElementById('btn-share')?.focus();
}

async function copyShareLink() {
  const shareUrl = buildShareUrl();
  if (!shareUrl) return;
  const btns = [document.getElementById('copy-link-btn'), document.getElementById('copy-link-btn2')].filter(Boolean);
  try {
    await navigator.clipboard.writeText(shareUrl);
    btns.forEach(b => { b.textContent = '✓ Copied!'; });
    setTimeout(() => btns.forEach(b => { b.textContent = b.id === 'copy-link-btn2' ? 'Copy' : '🔗 Copy link'; }), 2000);
  } catch (_) {
    // Fallback: select the text in the display box
    const display = document.getElementById('share-url-display');
    if (display) {
      const range = document.createRange();
      range.selectNode(display);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
    }
    btns.forEach(b => { b.textContent = 'Select & copy manually'; });
  }
}

async function copyImageToClipboard() {
  const btn = document.getElementById('copy-img-btn');
  if (!lastCanvasDataUrl) return;
  try {
    const blob = dataURItoBlob(lastCanvasDataUrl);
    await navigator.clipboard.write([
      new ClipboardItem({ 'image/png': blob })
    ]);
    btn.textContent = '✓ Copied!';
    setTimeout(() => { btn.textContent = '⎘ Copy image'; }, 2000);
  } catch (_) {
    btn.textContent = 'Copy not supported';
  }
}

function dataURItoBlob(dataURI) {
  const [header, data] = dataURI.split(',');
  const mime   = header.match(/:(.*?);/)[1];
  const binary = atob(data);
  const arr    = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

// ─────────────────────────────────────────────────────────────
// Canvas image builder
// ─────────────────────────────────────────────────────────────
function buildCanvas() {
  const title    = document.getElementById('dash-title').textContent;
  const eyebrow  = document.getElementById('dash-eyebrow').textContent;
  const rangeStr = document.getElementById('dash-range').textContent;
  const sleepVal = document.getElementById('stat-sleep').textContent;
  const bfVal    = document.getElementById('stat-bf').textContent;
  const feedsVal = document.getElementById('stat-feeds').textContent;
  const nappyVal = document.getElementById('stat-nappies').textContent;

  const evRows = document.querySelectorAll('.ev');
  const evData = [...evRows].map(row => ({
    time:   row.querySelector('.ev-time')?.textContent   || '',
    label:  row.querySelector('.ev-label')?.textContent  || '',
    detail: row.querySelector('.ev-detail')?.textContent || '',
    color:  row.querySelector('.ev-dot')?.style.backgroundColor || '#888',
  }));

  const barEl   = document.getElementById('tl-bar');
  const barSegs = [...barEl.querySelectorAll('.tl-segment, .tl-marker')].map(el => ({
    left:     parseFloat(el.style.left)  || 0,
    width:    parseFloat(el.style.width) || 0.4,
    bg:       el.style.background,
    isMarker: el.classList.contains('tl-marker'),
  }));

  const axisEl    = document.getElementById('tl-axis');
  const axisStart = axisEl.children[0]?.textContent || '';
  const axisEnd   = axisEl.children[1]?.textContent || '';
  const ticks     = [...document.querySelectorAll('.tl-tick')].map(t => ({
    left: parseFloat(t.style.left), text: t.textContent,
  }));

  const W = 750, MARGIN = 40;
  const canvas = document.createElement('canvas');
  const evH    = Math.max(evData.length * 30 + 60, 60);
  const H      = 80 + 60 + 140 + 120 + 80 + evH + 60;
  canvas.width  = W;
  canvas.height = H;

  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0e0f11';
  ctx.fillRect(0, 0, W, H);

  let y = MARGIN;

  // Eyebrow
  ctx.fillStyle = '#6b6f7a';
  ctx.font = '11px monospace';
  ctx.fillText(eyebrow.toUpperCase(), MARGIN, y);
  y += 22;

  // Title
  ctx.fillStyle = '#e8e6e1';
  ctx.font = 'italic 32px serif';
  ctx.fillText(title, MARGIN, y);
  y += 10;

  // Range
  ctx.fillStyle = '#6b6f7a';
  ctx.font = '12px monospace';
  ctx.fillText(rangeStr, MARGIN, y + 16);
  y += 42;

  // Divider
  ctx.strokeStyle = '#2a2d35'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(MARGIN, y); ctx.lineTo(W - MARGIN, y); ctx.stroke();
  y += 20;

  // Stats cards
  const stats = [
    { icon: '🌙', value: sleepVal, unit: 'h',   label: 'SLEEP' },
    { icon: '🤱', value: bfVal,    unit: 'min', label: 'BREASTFEEDING' },
    { icon: '🍼', value: feedsVal, unit: '',    label: 'TOTAL FEEDS' },
    { icon: '💧', value: nappyVal, unit: '',    label: 'NAPPIES' },
  ];
  const cw = (W - MARGIN * 2 - 12 * 3) / 4;
  stats.forEach((s, i) => {
    const cx = MARGIN + i * (cw + 12);
    roundRect(ctx, cx, y, cw, 90, 6, '#17191d', '#2a2d35');
    ctx.font = '18px serif';
    ctx.fillText(s.icon, cx + 12, y + 26);
    ctx.fillStyle = '#e8e6e1';
    ctx.font = 'bold 28px serif';
    ctx.fillText(s.value, cx + 12, y + 60);
    if (s.unit) {
      ctx.fillStyle = '#6b6f7a';
      ctx.font = '11px monospace';
      ctx.fillText(s.unit, cx + 12 + ctx.measureText(s.value).width + 3, y + 60);
    }
    ctx.fillStyle = '#6b6f7a';
    ctx.font = '9px monospace';
    ctx.fillText(s.label, cx + 12, y + 80);
  });
  y += 110;

  // Timeline label
  sectionLabel(ctx, 'TIMELINE', MARGIN, y, W - MARGIN);
  y += 24;

  // Axis labels
  ctx.fillStyle = '#4a4e5a'; ctx.font = '10px monospace';
  ctx.fillText(axisStart, MARGIN, y + 12);
  ctx.textAlign = 'right';
  ctx.fillText(axisEnd, W - MARGIN, y + 12);
  ctx.textAlign = 'left';
  y += 18;

  // Timeline bar
  const barW = W - MARGIN * 2, barH = 44;
  roundRect(ctx, MARGIN, y, barW, barH, 5, '#2a2d35', null);
  barSegs.forEach(seg => {
    const sx = MARGIN + (seg.left / 100) * barW;
    const sw = seg.isMarker ? 3 : (seg.width / 100) * barW;
    ctx.globalAlpha = seg.isMarker ? 0.95 : 0.9;
    roundRect(ctx, sx, y, Math.max(sw, 2), barH, seg.isMarker ? 2 : 0, cssVarToHex(seg.bg), null);
    ctx.globalAlpha = 1;
  });

  // Ticks
  y += barH + 4;
  ctx.fillStyle = '#4a4e5a'; ctx.font = '9px monospace'; ctx.textAlign = 'center';
  ticks.forEach(t => {
    ctx.fillText(t.text, MARGIN + (t.left / 100) * barW, y + 10);
  });
  ctx.textAlign = 'left';
  y += 24;

  // Legend
  const legends = [
    { color: '#5b8db8', label: 'Sleep' },
    { color: '#d4845a', label: 'Breastfeed' },
    { color: '#9b84c4', label: 'Bottle' },
    { color: '#5baa82', label: 'Nappy' },
    { color: '#2a2d35', label: 'Awake', border: '#363a45' },
  ];
  let lx = MARGIN;
  ctx.font = '10px monospace';
  legends.forEach(l => {
    roundRect(ctx, lx, y + 1, 10, 10, 2, l.color, l.border || null);
    ctx.fillStyle = '#6b6f7a';
    ctx.fillText(l.label, lx + 14, y + 11);
    lx += 14 + ctx.measureText(l.label).width + 16;
  });
  y += 28;

  // Divider
  ctx.strokeStyle = '#2a2d35'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(MARGIN, y); ctx.lineTo(W - MARGIN, y); ctx.stroke();
  y += 16;

  // Event log label
  sectionLabel(ctx, 'EVENT LOG', MARGIN, y, W - MARGIN);
  y += 24;

  evData.forEach((ev, i) => {
    const ry = y + i * 30;
    roundRect(ctx, MARGIN, ry, W - MARGIN * 2, 26, 4, '#17191d', '#2a2d35');
    ctx.fillStyle = '#6b6f7a'; ctx.font = '10px monospace';
    ctx.fillText(ev.time, MARGIN + 10, ry + 17);
    ctx.fillStyle = ev.color;
    ctx.beginPath(); ctx.arc(MARGIN + 62, ry + 13, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#e8e6e1'; ctx.font = '11px monospace';
    ctx.fillText(ev.label, MARGIN + 76, ry + 17);
    ctx.fillStyle = '#6b6f7a'; ctx.font = '10px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(ev.detail, W - MARGIN - 10, ry + 17);
    ctx.textAlign = 'left';
  });

  return canvas;
}

// ─────────────────────────────────────────────────────────────
// Canvas helpers
// ─────────────────────────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y,     x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x,     y + h, x,     y + h - r, r);
  ctx.lineTo(x, y + r);     ctx.arcTo(x,     y,     x + r, y,         r);
  ctx.closePath();
  if (fill)   { ctx.fillStyle = fill;     ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 1; ctx.stroke(); }
}

function sectionLabel(ctx, text, x, y, rx) {
  ctx.fillStyle = '#4a4e5a'; ctx.font = '9px monospace';
  ctx.fillText(text, x, y + 10);
  ctx.strokeStyle = '#2a2d35'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x, y + 14); ctx.lineTo(rx, y + 14); ctx.stroke();
}

function cssVarToHex(val) {
  const map = {
    'var(--sleep)':              '#5b8db8',
    'var(--breast)':             '#d4845a',
    'var(--bottle)':             '#9b84c4',
    'var(--diaper)':             '#5baa82',
    'var(--awake)':              '#2a2d35',
    'rgb(91, 141, 184)':         '#5b8db8',
    'rgb(212, 132, 90)':         '#d4845a',
    'rgb(155, 132, 196)':        '#9b84c4',
    'rgb(91, 170, 130)':         '#5baa82',
    'rgb(42, 45, 53)':           '#2a2d35',
  };
  return map[val] || val || '#555';
}

// ─────────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────────
function getBabyName() {
  const r = parsedRows.find(r => r['Profile Name'] && r['Profile Name'] !== '');
  return r ? r['Profile Name'] : '';
}
function localDateStr(d) {
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
}
function pad(n) { return String(n).padStart(2, '0'); }
function fmtDateOpt(ds) {
  const d = new Date(ds + 'T12:00:00');
  const D = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return D[d.getDay()] + ' ' + d.getDate() + ' ' + M[d.getMonth()];
}
function pct(ms, total) { return ((ms / total) * 100).toFixed(3) + '%'; }
function fmtDur(ms) {
  const m = Math.round(ms / 60000), h = Math.floor(m / 60), r = m % 60;
  return h > 0 && r > 0 ? h + 'h ' + r + 'm' : h > 0 ? h + 'h' : m + 'm';
}
function hh(d) { return pad(d.getHours()) + ':00'; }
function fmtDT(d) {
  const D = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return D[d.getDay()] + ' ' + d.getDate() + ' ' + M[d.getMonth()] + ' · ' + hh(d);
}

function resetApp() {
  parsedRows = []; availableDates = []; lastCanvasDataUrl = null;
  document.getElementById('upload-screen').style.display  = 'flex';
  document.getElementById('dashboard-screen').style.display = 'none';
  document.getElementById('file-input').value = '';
  clearError();
}
